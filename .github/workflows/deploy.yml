name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # 如果你的主分支是 master，請改為 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 如果用 pnpm 或 yarn 請自行修改

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build # 確保這行指令會產生你的 dist 資料夾

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # ✨ 關鍵：在這裡指定 dist 作為網站起始資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4